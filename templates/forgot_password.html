<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password</title>
<style>
body{
    font-family: Arial;
    background:#141e30;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}
.box{
    background:white;
    padding:30px;
    border-radius:10px;
    width:400px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}
h2{
    text-align:center;
    margin-bottom:20px;
}
input{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:1px solid #ccc;
    border-radius:8px;
}
button{
    width:100%;
    padding:12px;
    margin-top:20px;
    border:none;
    background:#16a34a;
    color:white;
    border-radius:8px;
    cursor:pointer;
}
button:hover{
    background:#15803d;
}
</style>
</head>
<body>

<div class="box">
    <h2>Forgot Password</h2>

    <form method="POST" action="/send_otp">
        <input
            type="email"
            name="email"
            placeholder="Enter your registered email"
            required
        >

        <button type="submit">
            Send OTP
        </button>
    </form>
</div>

</body>
</html>
