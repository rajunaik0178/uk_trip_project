<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>UK Trip — Login</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',system-ui,sans-serif;}
body{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#141e30,#243b55);
  padding:20px;
}
.box{
  background:#fff;width:420px;border-radius:16px;
  box-shadow:0 20px 60px rgba(0,0,0,0.35);overflow:hidden;
}
.box-top{
  background:linear-gradient(135deg,#1e3c72,#2a5298);
  padding:30px 30px 24px;text-align:center;color:#fff;
}
.box-top h1{font-size:24px;font-weight:700;margin-bottom:6px;}
.box-top p{font-size:13px;opacity:.75;}
.box-body{padding:28px 30px;}

/* ROLE TABS */
.role-tabs{display:flex;background:#f0f4f8;border-radius:8px;
  padding:4px;margin-bottom:22px;gap:4px;}
.role-tab{flex:1;padding:9px;text-align:center;cursor:pointer;
  border-radius:6px;font-size:13.5px;font-weight:500;
  color:#6b7280;transition:.2s;border:none;background:transparent;}
.role-tab.active{background:#fff;color:#1e3c72;
  box-shadow:0 2px 6px rgba(0,0,0,.12);}

label{display:block;font-size:12.5px;color:#444;
  margin-bottom:4px;font-weight:500;}
input{width:100%;padding:10px 12px;border:1.5px solid #e5e7eb;
  border-radius:8px;font-size:14px;outline:none;
  transition:.2s;background:#fff;margin-bottom:14px;}
input:focus{border-color:#2a5298;box-shadow:0 0 0 3px rgba(42,82,152,.1);}

.btn{width:100%;padding:12px;background:linear-gradient(135deg,#1e3c72,#2a5298);
  color:#fff;border:none;border-radius:8px;cursor:pointer;
  font-size:15px;font-weight:500;transition:.2s;margin-top:4px;}
.btn:hover{opacity:.9;transform:translateY(-1px);}

.register-link{text-align:center;margin-top:18px;font-size:13px;color:#888;}
.register-link a{color:#2a5298;font-weight:500;text-decoration:none;}
.register-link a:hover{text-decoration:underline;}

.alert{padding:11px 14px;border-radius:8px;margin-bottom:16px;
  font-size:13px;border-left:4px solid;}
.alert-danger{background:#fee2e2;color:#991b1b;border-color:#dc2626;}
.alert-success{background:#d1fae5;color:#065f46;border-color:#16a34a;}
.alert-warning{background:#fff3cd;color:#856404;border-color:#d97706;}
.alert-info{background:#dbeafe;color:#1e40af;border-color:#2a5298;}
</style>
</head>
<body>

<div class="box">
  <div class="box-top">
    <div style="font-size:40px;margin-bottom:10px;">✈️</div>
    <h1>UK Trip</h1>
    <p>Your premium UK travel management portal</p>
  </div>

  <div class="box-body">

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="alert alert-{{ cat }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}

    <!-- ROLE TABS -->
   <div class="role-tabs">
  <button type="button"
    class="role-tab active"
    id="tabUser"
    onclick="setRole('user')">
    👤 Traveler
  </button>

  <button type="button"
    class="role-tab"
    id="tabAdmin"
    onclick="setRole('admin')">
    🛡️ Admin
  </button>
</div>

    <form action="/login" method="POST">
      <input type="hidden" name="role" id="roleField" value="user">

      <label>Username</label>
      <input name="username" placeholder="Enter your name" required autocomplete="username">

      <label>Password</label>
      <input type="password" name="password" placeholder="Enter your password"
        required autocomplete="current-password">

      <button type="submit" class="btn">Login →</button>
    </form>

    <div class="register-link">
      New here? <a href="/register">Create a traveler account</a>
    </div>

  </div>
</div>

<script>
function setRole(role) {
  document.getElementById("roleField").value = role;

  document.getElementById("tabUser").classList.remove("active");
  document.getElementById("tabAdmin").classList.remove("active");

  if (role === "user") {
    document.getElementById("tabUser").classList.add("active");
  } else {
    document.getElementById("tabAdmin").classList.add("active");
  }
}
</script>

</body>
</html>
