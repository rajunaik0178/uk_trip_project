<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>UK Trip — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d1117;--bg2:#131920;--bg3:#1a2332;
  --card:#161d27;--border:#1f2d3d;--border2:#243447;
  --accent:#00e5a0;--accent2:#00c98a;--accent-dim:rgba(0,229,160,0.12);
  --text:#e8edf2;--text2:#8fa3b8;--text3:#5c7a96;
  --blue:#3b7dd8;--red:#ef4444;--orange:#f59e0b;--green:#10b981;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:var(--bg);
  font-family:'Inter',sans-serif;
  position:relative;overflow:hidden;
}

/* Background grid effect */
body::before{
  content:'';position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(0,229,160,0.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,229,160,0.03) 1px,transparent 1px);
  background-size:40px 40px;
  pointer-events:none;
}
/* Glow orbs */
.glow-1{
  position:fixed;top:-120px;left:-120px;
  width:500px;height:500px;border-radius:50%;
  background:radial-gradient(circle,rgba(0,229,160,0.08) 0%,transparent 70%);
  pointer-events:none;
}
.glow-2{
  position:fixed;bottom:-100px;right:-100px;
  width:400px;height:400px;border-radius:50%;
  background:radial-gradient(circle,rgba(59,125,216,0.07) 0%,transparent 70%);
  pointer-events:none;
}

.login-wrap{
  width:440px;max-width:95vw;
  background:var(--card);
  border:1px solid var(--border2);
  border-radius:16px;
  overflow:hidden;
  box-shadow:0 24px 80px rgba(0,0,0,0.6);
  position:relative;z-index:1;
}

/* HEADER */
.login-head{
  padding:32px 32px 26px;
  background:linear-gradient(135deg,rgba(0,229,160,0.06),rgba(59,125,216,0.06));
  border-bottom:1px solid var(--border);
  position:relative;
  overflow:hidden;
}
.login-head::after{
  content:'';position:absolute;top:-40px;right:-40px;
  width:140px;height:140px;border-radius:50%;
  background:radial-gradient(circle,rgba(0,229,160,0.12) 0%,transparent 70%);
}
.login-logo{
  font-family:'Space Grotesk',sans-serif;
  font-size:28px;font-weight:700;
  color:var(--accent);
  display:flex;align-items:center;gap:10px;
  margin-bottom:6px;
}
.login-logo span{font-size:28px;}
.login-sub{
  font-size:12px;color:var(--text3);
  text-transform:uppercase;letter-spacing:1.5px;
}

/* BODY */
.login-body{padding:28px 32px 32px;}

/* ROLE TABS */
.role-tabs{
  display:flex;
  background:var(--bg3);
  border:1px solid var(--border);
  border-radius:9px;padding:4px;
  margin-bottom:24px;gap:4px;
}
.role-tab{
  flex:1;padding:9px;text-align:center;cursor:pointer;
  border-radius:6px;font-size:12.5px;font-weight:600;
  color:var(--text3);transition:.2s;border:none;
  background:transparent;font-family:'Inter',sans-serif;
  letter-spacing:0.3px;
}
.role-tab.active{
  background:var(--accent-dim);
  color:var(--accent);
  border:1px solid rgba(0,229,160,0.25);
}

/* FORM */
.field-label{
  display:block;font-size:10.5px;color:var(--text3);
  margin-bottom:6px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;
}
.field-input{
  width:100%;padding:10px 14px;
  background:var(--bg3);
  border:1px solid var(--border2);
  border-radius:8px;font-size:13.5px;outline:none;
  transition:.15s;color:var(--text);margin-bottom:16px;
  font-family:'Inter',sans-serif;
}
.field-input:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 3px rgba(0,229,160,0.1);
}
.field-input::placeholder{color:var(--text3);}

.login-btn{
  width:100%;padding:12px;
  background:var(--accent);color:#0d1117;
  border:none;border-radius:9px;
  cursor:pointer;font-size:14px;font-weight:700;
  transition:.2s;margin-top:4px;
  font-family:'Space Grotesk',sans-serif;
  letter-spacing:0.3px;
}
.login-btn:hover{background:var(--accent2);transform:translateY(-1px);}

.register-link{
  text-align:center;margin-top:18px;font-size:12.5px;color:var(--text3);
}
.register-link a{color:var(--accent);font-weight:500;text-decoration:none;}
.register-link a:hover{text-decoration:underline;}

.alert{
  padding:10px 14px;border-radius:8px;margin-bottom:16px;
  font-size:12.5px;border:1px solid;display:flex;align-items:center;gap:8px;
}
.alert-danger{background:rgba(239,68,68,0.12);color:#ef4444;border-color:rgba(239,68,68,0.25);}
.alert-success{background:rgba(16,185,129,0.12);color:#10b981;border-color:rgba(16,185,129,0.25);}
.alert-warning{background:rgba(245,158,11,0.12);color:#f59e0b;border-color:rgba(245,158,11,0.25);}
.alert-info{background:rgba(59,125,216,0.12);color:#3b7dd8;border-color:rgba(59,125,216,0.25);}
</style>
</head>
<body>
<div class="glow-1"></div>
<div class="glow-2"></div>

<div class="login-wrap">
  <div class="login-head">
    <div class="login-logo">
      <span>✈</span> UK Trip
    </div>
    <div class="login-sub">Premium Travel Management Portal</div>
  </div>

  <div class="login-body">

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="alert alert-{{ cat }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}

    <div class="role-tabs">
      <button type="button" class="role-tab active" id="tabUser" onclick="setRole('user')">
        👤 Traveler
      </button>
      <button type="button" class="role-tab" id="tabAdmin" onclick="setRole('admin')">
        🛡 Admin
      </button>
    </div>

    <form action="/login" method="POST">
      <input type="hidden" name="role" id="roleField" value="user">

      <label class="field-label">Username</label>
      <input class="field-input" name="username" placeholder="Enter your name" required autocomplete="username">

      <label class="field-label">Password</label>
      <input class="field-input" type="password" name="password" placeholder="Enter your password" required autocomplete="current-password">

      <button type="submit" class="login-btn">Login →</button>
    </form>

    <div class="register-link">
      New here? <a href="/register">Create a traveler account</a>
    </div>

  </div>
</div>

<script>
function setRole(role){
  document.getElementById('roleField').value=role;
  document.getElementById('tabUser').classList.remove('active');
  document.getElementById('tabAdmin').classList.remove('active');
  document.getElementById(role==='user'?'tabUser':'tabAdmin').classList.add('active');
}
</script>
</body>
</html>
