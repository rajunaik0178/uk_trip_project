<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#141e30,#243b55);
}

.container{
background:white;
width:380px;
padding:40px;
border-radius:15px;
box-shadow:0 15px 40px rgba(0,0,0,0.3);
text-align:center;
transition:0.3s;
}

.container:hover{
transform:scale(1.02);
}

h2{
margin-bottom:20px;
color:#333;
}

.switch{
position:relative;
display:flex;
background:#eee;
border-radius:30px;
margin-bottom:25px;
overflow:hidden;
}

.switch button{
flex:1;
padding:12px;
border:none;
background:transparent;
cursor:pointer;
font-weight:bold;
z-index:2;
transition:0.3s;
}

.switch button:hover{
color:#2e7d32;
}

.slider{
position:absolute;
width:50%;
height:100%;
background:linear-gradient(135deg,#2e7d32,#66bb6a);
border-radius:30px;
left:0;
transition:0.4s ease;
box-shadow:0 5px 10px rgba(0,0,0,0.2);
}

.switch button.active{
color:white;
}

input{
width:100%;
padding:12px;
margin-top:12px;
border:1px solid #ccc;
border-radius:8px;
outline:none;
transition:0.3s;
}

input:focus{
border-color:#2e7d32;
box-shadow:0 0 5px rgba(46,125,50,0.5);
}

.login-btn{
width:100%;
padding:12px;
margin-top:18px;
background:linear-gradient(135deg,#2e7d32,#66bb6a);
color:white;
border:none;
border-radius:8px;
cursor:pointer;
font-size:16px;
transition:0.3s;
}

.login-btn:hover{
background:linear-gradient(135deg,#1b5e20,#43a047);
transform:scale(1.03);
}

a{
display:block;
margin-top:18px;
color:#555;
text-decoration:none;
}

a:hover{
color:#2e7d32;
}

</style>

<script>

function switchLogin(role){

document.getElementById("role").value = role;

let slider = document.getElementById("slider");

if(role=="admin"){
    slider.style.left="50%";
    document.getElementById("adminBtn").classList.add("active");
    document.getElementById("userBtn").classList.remove("active");
}
else{
    slider.style.left="0";
    document.getElementById("userBtn").classList.add("active");
    document.getElementById("adminBtn").classList.remove("active");
}

}

</script>

</head>

<body>

<div class="container">

<h2>🔐 Login Portal</h2>

<div class="switch">

<div class="slider" id="slider"></div>

<button id="userBtn" class="active" onclick="switchLogin('user')" type="button">
User
</button>

<button id="adminBtn" onclick="switchLogin('admin')" type="button">
Admin
</button>

</div>

<form action="/login" method="post">

<input type="hidden" name="role" id="role" value="user">

<input type="text" name="username" placeholder="Enter Username" required>

<input type="password" name="password" placeholder="Enter Password" required>

<button class="login-btn">Login</button>

</form>

<a href="/register">Create Account</a>

</div>

</body>
</html>
