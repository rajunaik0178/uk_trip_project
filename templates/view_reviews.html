{% extends "admin_base.html" %}

{% block content %}

<div class="card">

<h2>⭐ All Reviews</h2>

<table>

<tr>
<th>ID</th>
<th>User</th>
<th>Comment</th>
<th>Rating</th>
</tr>

{% for r in reviews %}

<tr>
<td>{{r.review_id}}</td>

<td>
User {{r.adharno}}
</td>

<td>{{r.comment}}</td>

<td>
    {% for i in range(r.rating|int) %}
        ⭐
    {% endfor %}
</td>

</tr>

{% endfor %}

</table>

</div>

{% endblock %}
