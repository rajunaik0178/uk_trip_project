<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>UK Trip — Verify OTP</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0d1117;
  --bg2:#131920;
  --bg3:#1a2332;
  --card:#161d27;
  --border:#1f2d3d;
  --border2:#243447;
  --accent:#00e5a0;
  --accent2:#00c98a;
  --accent-dim:rgba(0,229,160,0.12);
  --text:#e8edf2;
  --text2:#8fa3b8;
  --text3:#5c7a96;
  --red:#ef4444;
  --orange:#f59e0b;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:var(--bg);
  font-family:'Inter',sans-serif;
  position:relative;
  overflow:hidden;
}

body::before{
  content:'';
  position:fixed;
  inset:0;
  background-image:
    linear-gradient(rgba(0,229,160,.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,229,160,.03) 1px,transparent 1px);
  background-size:40px 40px;
  pointer-events:none;
}

.glow-1{
  position:fixed;
  top:-120px;
  left:-120px;
  width:500px;
  height:500px;
  border-radius:50%;
  background:radial-gradient(circle,rgba(0,229,160,.07) 0%,transparent 70%);
}

.glow-2{
  position:fixed;
  bottom:-100px;
  right:-100px;
  width:400px;
  height:400px;
  border-radius:50%;
  background:radial-gradient(circle,rgba(59,125,216,.06) 0%,transparent 70%);
}

.wrap{
  width:440px;
  max-width:95vw;
  background:var(--card);
  border:1px solid var(--border2);
  border-radius:16px;
  overflow:hidden;
  box-shadow:0 24px 80px rgba(0,0,0,.6);
  position:relative;
  z-index:1;
}

.head{
  padding:32px;
  background:linear-gradient(
    135deg,
    rgba(0,229,160,.06),
    rgba(59,125,216,.06)
  );
  border-bottom:1px solid var(--border);
}

.logo{
  font-family:'Space Grotesk',sans-serif;
  font-size:26px;
  font-weight:700;
  color:var(--accent);
  margin-bottom:6px;
}

.sub-title{
  font-size:12px;
  color:var(--text3);
  text-transform:uppercase;
  letter-spacing:1.5px;
}

.body{
  padding:28px 32px 32px;
}

.alert{
  padding:10px 14px;
  border-radius:8px;
  margin-bottom:16px;
  font-size:12.5px;
  border:1px solid;
}

.alert-danger{
  background:rgba(239,68,68,.12);
  color:#ef4444;
  border-color:rgba(239,68,68,.25);
}

.alert-success{
  background:rgba(16,185,129,.12);
  color:#10b981;
  border-color:rgba(16,185,129,.25);
}

.otp-icon{
  width:64px;
  height:64px;
  border-radius:50%;
  background:var(--accent-dim);
  border:2px solid rgba(0,229,160,.25);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  margin:0 auto 18px;
}

.info-text{
  text-align:center;
  font-size:13px;
  color:var(--text2);
  line-height:1.7;
  margin-bottom:24px;
}

.info-text strong{
  color:var(--accent);
}

.otp-boxes{
  display:flex;
  gap:10px;
  justify-content:center;
  margin-bottom:18px;
}

.otp-box{
  width:52px;
  height:58px;
  background:var(--bg3);
  border:1px solid var(--border2);
  border-radius:10px;
  text-align:center;
  font-size:22px;
  font-weight:700;
  color:var(--text);
  outline:none;
}

.otp-box:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 3px rgba(0,229,160,.12);
}

#otpHidden{
  display:none;
}

.sub-btn{
  width:100%;
  padding:12px;
  background:var(--accent);
  color:#0d1117;
  border:none;
  border-radius:9px;
  cursor:pointer;
  font-size:14px;
  font-weight:700;
  font-family:'Space Grotesk',sans-serif;
}

.sub-btn:disabled{
  opacity:.6;
  cursor:not-allowed;
}

.link-row{
  text-align:center;
  margin-top:18px;
  font-size:12px;
}

.link-row a{
  color:var(--accent);
  text-decoration:none;
}
</style>
</head>

<body>

<div class="glow-1"></div>
<div class="glow-2"></div>

<div class="wrap">

  <div class="head">
    <div class="logo">✈ UK Trip</div>
    <div class="sub-title">OTP Verification</div>
  </div>

  <div class="body">

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="alert alert-{{ cat }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}

    <div class="otp-icon">🔐</div>

    <div class="info-text">
      We sent a <strong>6-digit OTP</strong> to your email.<br>
      Enter it below to verify your identity.
    </div>

    <!-- FIXED HERE -->
    <form method="POST" action="/check_otp" onsubmit="return mergeOtp()">

      <div class="otp-boxes">
        <input class="otp-box" type="text" maxlength="1" id="b0" oninput="advance(0)">
        <input class="otp-box" type="text" maxlength="1" id="b1" oninput="advance(1)">
        <input class="otp-box" type="text" maxlength="1" id="b2" oninput="advance(2)">
        <input class="otp-box" type="text" maxlength="1" id="b3" oninput="advance(3)">
        <input class="otp-box" type="text" maxlength="1" id="b4" oninput="advance(4)">
        <input class="otp-box" type="text" maxlength="1" id="b5" oninput="advance(5)">
      </div>

      <input type="hidden" name="otp" id="otpHidden">

      <button type="submit" class="sub-btn" id="verifyBtn" disabled>
        Verify OTP →
      </button>

    </form>

    <div class="link-row">
      <a href="/forgot_password">← Use different email</a>
    </div>

  </div>
</div>

<script>
function advance(i){
  let box = document.getElementById("b" + i);
  box.value = box.value.replace(/\D/g, '');

  if(box.value && i < 5){
    document.getElementById("b" + (i + 1)).focus();
  }

  checkComplete();
}

function getOtp(){
  let otp = "";
  for(let i = 0; i < 6; i++){
    otp += document.getElementById("b" + i).value;
  }
  return otp;
}

function checkComplete(){
  let otp = getOtp();
  document.getElementById("verifyBtn").disabled = otp.length !== 6;
}

function mergeOtp(){
  let otp = getOtp();

  if(otp.length !== 6){
    alert("Please enter full 6-digit OTP");
    return false;
  }

  document.getElementById("otpHidden").value = otp;
  return true;
}

document.getElementById("b0").focus();
</script>

</body>
</html>
