<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
display:flex;
background:#f4f6f9;
}

/* SIDEBAR */
.sidebar{
width:230px;
height:100vh;
background:linear-gradient(180deg,#000428,#004e92);
color:white;
padding:20px;
position:fixed;
}

.sidebar h2{
margin-bottom:20px;
text-align:center;
}

.sidebar a{
display:block;
color:white;
padding:12px;
margin:10px 0;
text-decoration:none;
border-radius:6px;
transition:0.3s;
}

.sidebar a:hover{
background:rgba(255,255,255,0.2);
}

/* ACTIVE LINK */
.sidebar a.active{
background:rgba(255,255,255,0.3);
}

/* CONTENT */
.content{
margin-left:230px;
padding:30px;
width:100%;
}

/* CARD */
.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

/* FORM */
.form-box{
background:#f9f9f9;
padding:20px;
border-radius:10px;
width:300px;
}

input, textarea{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:5px;
border:1px solid #ccc;
}

/* TABLE */
table{
width:100%;
border-collapse:collapse;
margin-top:20px;
background:white;
border-radius:10px;
overflow:hidden;
}

thead{
background:#004e92;
color:white;
}

th, td{
padding:12px;
border-bottom:1px solid #eee;
text-align:left;
}

tr:hover{
background:#f1f1f1;
}

/* BUTTONS */
.btn{
padding:6px 12px;
border:none;
border-radius:5px;
background:#004e92;
color:white;
cursor:pointer;
}

.btn:hover{
opacity:0.9;
}

.btn-danger{
background:red;
}

/* STATUS */
.status{
padding:5px 10px;
border-radius:5px;
color:white;
font-size:13px;
}

.status.Booked{
background:green;
}

.status.Cancelled{
background:red;
}


/* ===================== STATS UI ===================== */
.stats-container{
display:flex;
gap:20px;
flex-wrap:wrap;
margin-top:10px;
}

.stat-card{
flex:1;
min-width:220px;
padding:25px;
border-radius:12px;
color:white;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
transition:0.3s;
}

.stat-card:hover{
transform:scale(1.05);
}

/* COLORS */
.users{
background:linear-gradient(135deg,#36d1dc,#5b86e5);
}

.bookings{
background:linear-gradient(135deg,#f7971e,#ffd200);
}

.revenue{
background:linear-gradient(135deg,#11998e,#38ef7d);
}

/* TEXT */
.stat-card h3{
font-size:16px;
margin-bottom:10px;
}

.stat-card h1{
font-size:28px;
}


/* ===================== PAGE HEADER ===================== */
.page-header{
margin-bottom:20px;
}

.page-header h2{
font-size:24px;
}

.page-header p{
color:gray;
font-size:14px;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>Admin Panel</h2>

<a href="/admin_dashboard">🏠 Dashboard</a>
<a href="/manage_packages">📦 Manage Packages</a>
<a href="/view_bookings">📄 Bookings</a>
<a href="/view_reviews">⭐ Reviews</a>
<a href="/stats">📊 Statistics</a>
<a href="/logout">🚪 Logout</a>

</div>

<div class="content">

{% block content %}
{% endblock %}

</div>

</body>
</html>
